<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <!-- Icon box -->
  <rect x="0" y="6" width="52" height="52" rx="10" fill="#FF6B35"/>
  <text
    x="26"
    y="42"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="700"
    font-style="italic"
    fill="#ffffff"
    text-anchor="middle">T</text>
  <!-- dot accent pojok kanan atas icon -->
  <circle cx="43" cy="10" r="4" fill="#ffffff" opacity="0.92"/>

  <!-- Wordmark -->
  <text
    x="66"
    y="42"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="700"
    font-style="italic"
    fill="#ffffff"
    letter-spacing="-1">Travia</text>

  <!-- dot aksen di atas huruf i pada wordmark -->
  <circle cx="236" cy="12" r="4.5" fill="#FF6B35"/>

  <!-- underline accent oranye -->
  <line x1="66" y1="52" x2="290" y2="52" stroke="#FF6B35" stroke-width="2" stroke-linecap="round"/>

  <!-- tagline -->
  <text
    x="66"
    y="62"
    font-family="Arial, Helvetica, sans-serif"
    font-size="9"
    fill="#555555"
    letter-spacing="3">AI TRAVEL AGENT</text>
</svg>
